<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verification Dashboard - SafeHire</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui"] },
          colors: {
            brand: {
              50: "#F5D0FE",
              100: "#F0ABFC",
              500: "#EC4899",
              600: "#DB2777",
              700: "#BE185D"
            }
          },
          boxShadow: {
            glow: "0 0 40px rgba(236,72,153,0.25)"
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen font-sans text-white bg-gradient-to-br from-[#0B1020] via-[#24124D] to-[#6B21A8]">
  <header class="sticky top-0 z-50 bg-black/30 backdrop-blur border-b border-white/10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="h-9 w-9 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-500 flex items-center justify-center font-bold text-white">
          S
        </div>
        <div>
          <p class="font-semibold leading-5 text-white">SafeHire</p>
          <p class="text-xs text-gray-300 -mt-0.5">Verification Dashboard</p>
        </div>
      </div>

      <nav class="hidden md:flex items-center gap-6 text-sm text-gray-300">
        <a class="hover:text-white" href="/">Home</a>
        <a class="hover:text-white" href="/worker-dashboard">Workers</a>
        <a class="hover:text-white" href="/add-worker">Add Worker</a>
        <a class="hover:text-white" href="/verify-workers">Verify</a>
        <a class="hover:text-white" href="/jobs">Jobs</a>
        <a class="hover:text-white" href="/transactions">Transactions</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="mb-6">
      <div class="inline-flex items-center px-4 py-2 rounded-full border border-white/10 bg-white/5 backdrop-blur text-sm text-pink-200 mb-4">
        Admin Verification Panel
      </div>

      <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white">Verify Workers</h1>
      <p class="text-gray-300 mt-2">Mark worker profiles as Verified, Pending, or Rejected.</p>
    </div>

    <section class="bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-xl shadow-2xl">
      <div id="verifyList" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    </section>
  </main>

  <script src="/static/js/verify_workers.js"></script>
</body>
</html>
