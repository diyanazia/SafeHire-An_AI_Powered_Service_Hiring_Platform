<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui"] },
          colors: {
            brand: {
              50:  "#ECFEFF",
              100: "#CFFAFE",
              500: "#14B8A6",
              600: "#0D9488",
              700: "#0F766E"
            }
          }
        }
      }
    }
  </script>
</head>

<body class="bg-[#FAFAFA] text-slate-900 font-sans">
  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur border-b border-[#E5E7EB]">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

      </div>

      <nav class="hidden md:flex items-center gap-6 text-sm text-slate-600">
        <a class="hover:text-slate-900" href="/">Home</a>
        <a class="hover:text-slate-900" href="/worker-dashboard">Workers</a>
        <a class="hover:text-slate-900" href="/jobs">Jobs</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="mb-6">
      <h1 class="text-2xl md:text-3xl font-semibold tracking-tight">Transactions</h1>
      <p class="text-slate-600 mt-1">Track hiring records for transparency and accountability.</p>
    </div>

    <section class="bg-white border border-[#E5E7EB] rounded-3xl p-6 transition hover:shadow-sm">
      <div id="transactionList" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    </section>

  <script src="/static/js/transactions.js"></script>
