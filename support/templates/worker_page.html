<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Worker - SafeHire</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui"]
          },
          colors: {
            brand: {
              50: "#F5D0FE",
              100: "#F0ABFC",
              500: "#EC4899",
              600: "#DB2777",
              700: "#BE185D"
            }
          },
          boxShadow: {
            glow: "0 0 40px rgba(236,72,153,0.25)"
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen font-sans text-white bg-gradient-to-br from-[#0B1020] via-[#24124D] to-[#6B21A8]">
  <header class="sticky top-0 z-50 bg-black/30 backdrop-blur border-b border-white/10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img 
          src="/static/images/SafeHire_logo.png"
          alt="SafeHire Logo"
          class="h-12 w-12 rounded-full shadow-lg"
        />
        <div>
          <p class="font-semibold leading-5 text-white">SafeHire</p>
          <p class="text-xs text-gray-300 -mt-0.5">AI Powered Hiring Platform</p>
        </div>
      </div>

      <nav class="hidden md:flex items-center gap-6 text-sm text-gray-300">
        <a class="hover:text-white" href="/">Home</a>
        <a class="hover:text-white" href="/worker-dashboard">Workers</a>
        <a class="hover:text-white" href="/add-worker">Add Worker</a>
        <a class="hover:text-white" href="/verify-workers">Verify</a>
        <a class="hover:text-white" href="/jobs">Jobs</a>
        <a class="hover:text-white" href="/transactions">Transactions</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="max-w-3xl mx-auto rounded-[32px] border border-white/10 bg-white/5 backdrop-blur-xl p-8 md:p-10 shadow-2xl">
      <div class="mb-4">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight leading-tight text-white">
          Register a Worker
        </h1>

      </div>

      <form id="workerForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label for="name" class="block text-sm font-semibold text-white mb-2">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter worker name"
              required
              class="w-full h-12 rounded-2xl border border-white/10 bg-white/10 text-white placeholder:text-gray-400 px-4 outline-none focus:ring-4 focus:ring-pink-500/20 focus:border-pink-400"
            />
          </div>

          <div>
            <label for="nid" class="block text-sm font-semibold text-white mb-2">NID</label>
            <input
              type="text"
              id="nid"
              name="nid"
              placeholder="Enter NID number"
              required
              class="w-full h-12 rounded-2xl border border-white/10 bg-white/10 text-white placeholder:text-gray-400 px-4 outline-none focus:ring-4 focus:ring-pink-500/20 focus:border-pink-400"
            />
          </div>

          <div>
            <label for="phone" class="block text-sm font-semibold text-white mb-2">Phone</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="Enter phone number"
              required
              class="w-full h-12 rounded-2xl border border-white/10 bg-white/10 text-white placeholder:text-gray-400 px-4 outline-none focus:ring-4 focus:ring-pink-500/20 focus:border-pink-400"
            />
          </div>

          <div>
            <label for="address" class="block text-sm font-semibold text-white mb-2">Address</label>
            <input
              type="text"
              id="address"
              name="address"
              placeholder="Enter address"
              required
              class="w-full h-12 rounded-2xl border border-white/10 bg-white/10 text-white placeholder:text-gray-400 px-4 outline-none focus:ring-4 focus:ring-pink-500/20 focus:border-pink-400"
            />
          </div>

          <div class="md:col-span-2">
            <label for="skills" class="block text-sm font-semibold text-white mb-2">Skills</label>
            <input
              type="text"
              id="skills"
              name="skills"
              placeholder="Example: Electrician, Wiring, Repair"
              required
              class="w-full h-12 rounded-2xl border border-white/10 bg-white/10 text-white placeholder:text-gray-400 px-4 outline-none focus:ring-4 focus:ring-pink-500/20 focus:border-pink-400"
            />
          </div>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            class="inline-flex items-center px-6 py-3 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-500 text-white font-semibold hover:opacity-90 transition shadow-glow"
          >
            Add Worker
          </button>
        </div>

        <div id="formMessage" class="hidden rounded-2xl px-4 py-3 text-sm font-medium"></div>
      </form>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/worker_api.js') }}"></script>

  <script>
    const formMessage = document.getElementById("formMessage");

    const observer = new MutationObserver(() => {
      if (formMessage.textContent.trim() !== "") {
        formMessage.classList.remove("hidden");
      }
    });

    observer.observe(formMessage, { childList: true, subtree: true });
  </script>
</body>
</html>
